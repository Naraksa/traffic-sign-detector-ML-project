<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ប្រព័ន្ធស្គាល់សញ្ញាចរាចរណ៍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;600;700&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="bg-grid"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🚦</span>
      <div>
        <div class="logo-title">TrafficScan KH</div>
        <div class="logo-sub">ប្រព័ន្ធស្គាល់សញ្ញាចរាចរណ៍</div>
      </div>
    </div>
    <div class="demo-badge" id="demoBadge">DEMO MODE</div>
  </div>
</header>

<main>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnUpload">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Image
    </button>
    <button class="mode-btn" id="btnScan">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M4 4h4V2H2v6h2zm16 0V2h-6v2h4v4h2zM4 20v-4H2v6h6v-2zm16 0h-4v2h6v-6h-2z"/>
      </svg>
      Live Camera
    </button>
  </div>

  <div class="workspace">

    <!-- Upload Panel -->
    <div class="panel" id="uploadPanel">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="drop-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="drop-title">Drop image here</div>
        <div class="drop-sub">or click to browse</div>
        <div class="drop-hint">JPG · PNG · WEBP</div>
      </div>

      <div class="preview-area" id="previewArea" style="display:none">
        <div class="preview-img-wrap">
          <img id="previewImg" alt="Preview">
          <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="preview-actions">
          <button class="btn-primary" id="detectBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Detect Signs
          </button>
          <button class="btn-ghost" id="resetBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
            </svg>
            Reset
          </button>
        </div>
      </div>
    </div>

    <!-- Camera Panel -->
    <div class="panel" id="scanPanel" style="display:none">
      <div class="camera-wrap">
        <video id="videoFeed" autoplay playsinline muted></video>
        <canvas id="scanCanvas" style="display:none"></canvas>
        <div class="scan-overlay">
          <div class="scan-frame">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
          </div>
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="camera-actions">
        <button class="btn-primary" id="captureBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M20.4 12A8.4 8.4 0 0112 20.4M3.6 12A8.4 8.4 0 0112 3.6"/>
          </svg>
          Capture &amp; Detect
        </button>
        <button class="btn-ghost" id="stopCamBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="12" height="12"/>
          </svg>
          Stop Camera
        </button>
      </div>
      <div id="cameraError" class="camera-error" style="display:none"></div>
    </div>

    <!-- Results Panel -->
    <div class="results-panel" id="resultsPanel">
      <div class="results-header">
        <h2>Detection Results</h2>
        <label class="switch-label">
          <input type="checkbox" id="voiceToggle" checked>
          <span class="switch-track"><span class="switch-thumb"></span></span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
          Voice
        </label>
      </div>

      <div id="resultsContent">
        <div class="results-empty">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>No detections yet</p>
          <span>Upload or capture an image to begin</span>
        </div>
      </div>

      <div class="loading-overlay" id="loadingOverlay" style="display:none">
        <div class="spinner"></div>
        <span>Analyzing…</span>
      </div>
    </div>

  </div>
</main>

<script src="/static/js/app.js"></script>
</body>
</html>
